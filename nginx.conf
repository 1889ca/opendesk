# Development / HTTP-only config.
# In production, TLS termination is expected to be performed by a load balancer
# (e.g. Caddy, Traefik, or a cloud LB) in front of this nginx instance.
# If nginx itself must terminate TLS (self-hosted, no upstream LB), see
# nginx.ssl.conf.example for a reference HTTPS server block.
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Security headers (CSP and HSTS are handled by Helmet in Express)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # When an upstream load balancer has already terminated TLS and forwarded
    # the request here over HTTP, honour the X-Forwarded-Proto it set rather
    # than overwriting it with '$scheme' (which would always be 'http' here).
    # If no upstream header is present this falls back to '$scheme'.
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto) {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    location / {
        proxy_pass http://opendesk:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /collab {
        proxy_pass http://opendesk:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 3600s;
    }
}
