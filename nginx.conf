# Development config — HTTP only.
# For production, TLS should be terminated at the load balancer / reverse proxy
# (e.g. Caddy, Traefik, or cloud LB) in front of this nginx instance.
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Security headers (CSP and HSTS are handled by Helmet in Express)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    location / {
        proxy_pass http://opendesk:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /collab {
        proxy_pass http://opendesk:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
