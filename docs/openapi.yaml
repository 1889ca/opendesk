  # ===== References =====

  /api/references:
    get:
      tags: [References]
      summary: List references
      description: List references in the library. Optionally filter by documentId.
      parameters:
        - name: documentId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of references
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reference"
        "403":
          description: No read access to reference library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [References]
      summary: Create a reference
      description: Add a new reference to the library.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferenceBody"
      responses:
        "201":
          description: Created reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reference"
        "403":
          description: No write access to reference library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/references/lookup/doi/{doi}:
    get:
      tags: [References]
      summary: Lookup reference by DOI
      description: Fetch reference metadata from CrossRef by DOI.
      parameters:
        - name: doi
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reference metadata
          content:
            application/json:
              schema:
                type: object
        "404":
          description: DOI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream lookup error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/references/lookup/isbn/{isbn}:
    get:
      tags: [References]
      summary: Lookup reference by ISBN
      description: Fetch reference metadata from OpenLibrary by ISBN.
      parameters:
        - name: isbn
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reference metadata
          content:
            application/json:
              schema:
                type: object
        "404":
          description: ISBN not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream lookup error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/references/{id}:
    get:
      tags: [References]
      summary: Get a reference
      description: Retrieve a single reference by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reference object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reference"
        "404":
          description: Reference not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [References]
      summary: Update a reference
      description: Update fields on an existing reference.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReferenceBody"
      responses:
        "200":
          description: Updated reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reference"
        "403":
          description: No write access to reference library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reference not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [References]
      summary: Delete a reference
      description: Remove a reference from the library.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "403":
          description: No delete access to reference library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Reference not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/references/import:
    post:
      tags: [References]
      summary: Import references from BibTeX or RIS
      description: Parse and import references from BibTeX or RIS format. Set Content-Type to application/x-bibtex or application/x-ris.
      requestBody:
        required: true
        content:
          application/x-bibtex:
            schema:
              type: string
          application/x-ris:
            schema:
              type: string
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  references:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reference"
        "403":
          description: No write access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Unsupported format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: No valid references found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/references/export:
    get:
      tags: [References]
      summary: Export references as BibTeX or RIS
      description: Export the entire reference library in the specified format.
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [bibtex, ris]
      responses:
        "200":
          description: Exported file
          content:
            application/x-bibtex:
              schema:
                type: string
            application/x-ris:
              schema:
                type: string
        "400":
          description: Invalid format parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No read access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Files =====

  /api/upload:
    post:
      tags: [Files]
      summary: Upload an image
      description: Upload an image file (PNG, JPEG, GIF, WebP) to S3. Max 10 MB. Requires auth; document-specific uploads require write permission.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                documentId:
                  type: string
                  default: general
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  key:
                    type: string
                  contentType:
                    type: string
                  size:
                    type: integer
        "400":
          description: No file or unsupported type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No write access to document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/files/{key}:
    get:
      tags: [Files]
      summary: Retrieve a file
      description: Stream a file from S3. Requires auth; document-specific files require read permission.
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: "S3 key path (e.g. uploads/{docId}/{uuid}.png)"
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden file path or no read access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Sharing =====

  /api/documents/{id}/share:
    post:
      tags: [Sharing]
      summary: Create a share link
      description: Generate a share link for a document. Supports optional expiry, max redemptions, and password protection. Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkBody"
      responses:
        "201":
          description: Created share link (passwordHash is never returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "400":
          description: Invalid role or options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/share/{token}/resolve:
    post:
      tags: [Sharing]
      summary: Resolve (redeem) a share link
      description: Redeem a share link token to get access. Provide password if link is password-protected. Rate-limited. No auth required.
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveShareLinkBody"
      responses:
        "200":
          description: Resolved grant and link info
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant:
                    type: object
                    properties:
                      docId:
                        type: string
                      role:
                        type: string
                  link:
                    $ref: "#/components/schemas/ShareLink"
        "403":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Link expired, revoked, or exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many password attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  retryAfterSeconds:
                    type: integer

  /api/share/{token}:
    delete:
      tags: [Sharing]
      summary: Revoke a share link
      description: Revoke a share link. Only the creator or someone with write permission on the document may revoke.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Audit =====

  /api/audit/documents/{id}/log:
    get:
      tags: [Audit]
      summary: Get paginated audit log
      description: Retrieve the audit log for a document. Requires manage permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Array of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/audit/verify/{documentId}:
    get:
      tags: [Audit]
      summary: Verify HMAC chain integrity
      description: Verify the HMAC chain integrity for a document's audit log. Requires manage permission.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  entries:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/audit/proof/{documentId}:
    get:
      tags: [Audit]
      summary: Export full audit proof bundle
      description: Export a complete cryptographic audit proof for a document. Requires manage permission.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full audit proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditProof"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/audit/proof/{documentId}/summary:
    get:
      tags: [Audit]
      summary: Export lightweight proof summary
      description: Export a lightweight summary of the audit proof for a document. Requires manage permission.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Proof summary
          content:
            application/json:
              schema:
                type: object
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/audit/proof/verify:
    post:
      tags: [Audit]
      summary: Verify a proof bundle offline
      description: Stateless verification of an audit proof bundle. Requires auth but no document permissions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proof, hmacSecret]
              properties:
                proof:
                  $ref: "#/components/schemas/AuditProof"
                hmacSecret:
                  type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  entries:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing proof or hmacSecret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Workflow =====

  /api/workflows:
    get:
      tags: [Workflow]
      summary: List workflow definitions
      description: List workflow definitions for a document. Requires read permission on the document.
      parameters:
        - name: documentId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Array of workflow definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowDefinition"
        "400":
          description: Missing documentId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
