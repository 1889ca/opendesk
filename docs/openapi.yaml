openapi: 3.1.0
info:
  title: OpenDesk API
  description: >
    Sovereign, open-source office suite API. Provides document management,
    real-time collaboration, sharing, audit trails, workflow automation,
    cross-sovereign federation, local AI assistance, and verifiable data erasure.
  version: 0.1.0
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:5500
    description: Local development server

tags:
  - name: Documents
    description: Document CRUD, search, export/import, and conversion
  - name: Folders
    description: Folder management and document organization
  - name: Templates
    description: Document template CRUD
  - name: Versions
    description: Document version history and restore
  - name: References
    description: Reference library CRUD, DOI/ISBN lookup, BibTeX/RIS import/export
  - name: Files
    description: File upload and retrieval (S3-backed)
  - name: Sharing
    description: Share links — create, resolve, and revoke
  - name: Audit
    description: Audit logs, HMAC chain verification, and proof export
  - name: Workflow
    description: Workflow definitions and execution history
  - name: Federation
    description: Cross-sovereign peer federation and document transfer
  - name: AI
    description: Local AI — semantic search, RAG assistant, embeddings
  - name: Erasure
    description: Verifiable data erasure and retention policies
  - name: Admin
    description: User data purge, metrics, and system health

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT or dev-mode token passed as Bearer header

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ValidationError:
      type: object
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
      required: [error, issues]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
      required: [ok]

    # --- Documents ---
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        documentType:
          type: string
          enum: [text, spreadsheet, presentation]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateDocumentBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        documentType:
          type: string
          enum: [text, spreadsheet, presentation]
          default: text

    UpdateDocumentBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200

    MoveDocumentBody:
      type: object
      required: [folderId]
      properties:
        folderId:
          type: string
          format: uuid
          nullable: true

    # --- Folders ---
    Folder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateFolderBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        parentId:
          type: string
          format: uuid
          nullable: true

    RenameFolderBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200

    # --- Templates ---
    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        content:
          type: object
        isOwner:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateTemplateBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
          default: ""
        content:
          type: object
          default: {}

    UpdateTemplateBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        content:
          type: object

    # --- Versions ---
    Version:
      type: object
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        version_number:
          type: integer
        content:
          type: object
        name:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    CreateVersionBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 200

    # --- References ---
    Reference:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        year:
          type: integer
          nullable: true
        source:
          type: string
          nullable: true
        type:
          type: string
          enum: [article, book, chapter, website, other]
        doi:
          type: string
          nullable: true
        isbn:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        publisher:
          type: string
          nullable: true

    CreateReferenceBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        authors:
          type: array
          items:
            type: string
          default: []
        year:
          type: integer
          nullable: true
        source:
          type: string
          maxLength: 500
          nullable: true
        volume:
          type: string
          maxLength: 100
          nullable: true
        issue:
          type: string
          maxLength: 100
          nullable: true
        pages:
          type: string
          maxLength: 100
          nullable: true
        doi:
          type: string
          maxLength: 200
          nullable: true
        isbn:
          type: string
          maxLength: 50
          nullable: true
        url:
          type: string
          format: uri
          maxLength: 2000
          nullable: true
        publisher:
          type: string
          maxLength: 500
          nullable: true
        type:
          type: string
          enum: [article, book, chapter, website, other]
          default: other

    UpdateReferenceBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        authors:
          type: array
          items:
            type: string
        year:
          type: integer
          nullable: true
        source:
          type: string
          maxLength: 500
          nullable: true
        volume:
          type: string
          maxLength: 100
          nullable: true
        issue:
          type: string
          maxLength: 100
          nullable: true
        pages:
          type: string
          maxLength: 100
          nullable: true
        doi:
          type: string
          maxLength: 200
          nullable: true
        isbn:
          type: string
          maxLength: 50
          nullable: true
        url:
          type: string
          format: uri
          maxLength: 2000
          nullable: true
        publisher:
          type: string
          maxLength: 500
          nullable: true
        type:
          type: string
          enum: [article, book, chapter, website, other]

    # --- Sharing ---
    ShareLink:
      type: object
      properties:
        token:
          type: string
        docId:
          type: string
        grantorId:
          type: string
        role:
          type: string
          enum: [viewer, editor, commenter]
        expiresAt:
          type: string
          format: date-time
        maxRedemptions:
          type: integer
        redemptionCount:
          type: integer
        revoked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateShareLinkBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [viewer, editor, commenter]
        options:
          type: object
          properties:
            expiresIn:
              type: integer
              description: Seconds until expiry
            maxRedemptions:
              type: integer
            password:
              type: string
              minLength: 1

    ResolveShareLinkBody:
      type: object
      properties:
        password:
          type: string

    # --- Audit ---
    AuditEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
        action:
          type: string
        actor_id:
          type: string
        hmac:
          type: string
        created_at:
          type: string
          format: date-time

    AuditProof:
      type: object
      properties:
        documentId:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        hmacSecret:
          type: string

    # --- Workflow ---
    WorkflowDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
        name:
          type: string
        triggerType:
          type: string
          enum: [document.updated, document.exported, grant.created, grant.revoked]
        actionType:
          type: string
          enum: [webhook, export, notify]
        actionConfig:
          type: object
        createdBy:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    CreateWorkflowBody:
      type: object
      required: [name, documentId, triggerType, actionType, actionConfig]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        documentId:
          type: string
          minLength: 1
        triggerType:
          type: string
          enum: [document.updated, document.exported, grant.created, grant.revoked]
        actionType:
          type: string
          enum: [webhook, export, notify]
        actionConfig:
          type: object

    UpdateWorkflowBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        triggerType:
          type: string
          enum: [document.updated, document.exported, grant.created, grant.revoked]
        actionType:
          type: string
          enum: [webhook, export, notify]
        actionConfig:
          type: object
        active:
          type: boolean

    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        triggerEventId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        startedAt:
          type: string
        completedAt:
          type: string
          nullable: true
        error:
          type: string
          nullable: true

    # --- Federation ---
    FederationPeer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        endpointUrl:
          type: string
          format: uri
        publicKey:
          type: string
        trustLevel:
          type: string
          enum: [standard, elevated, restricted]
        status:
          type: string
          enum: [active, suspended, revoked]
        lastSeenAt:
          type: string
          nullable: true
        registeredBy:
          type: string
        createdAt:
          type: string

    RegisterPeerBody:
      type: object
      required: [name, endpointUrl, publicKey]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        endpointUrl:
          type: string
          format: uri
        publicKey:
          type: string
          minLength: 1
        trustLevel:
          type: string
          enum: [standard, elevated, restricted]
          default: standard

    SendDocumentBody:
      type: object
      required: [documentId, peerId]
      properties:
        documentId:
          type: string
          format: uuid
        peerId:
          type: string
          format: uuid

    TransferBundle:
      type: object
      required: [sendingInstanceId, documentId, documentTitle, yjsStateBase64, signature, timestamp]
      properties:
        sendingInstanceId:
          type: string
        documentId:
          type: string
        documentTitle:
          type: string
        yjsStateBase64:
          type: string
        auditProofHash:
          type: string
        signature:
          type: string
        timestamp:
          type: string

    TransferRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        peerId:
          type: string
          format: uuid
        direction:
          type: string
          enum: [inbound, outbound]
        documentId:
          type: string
        documentTitle:
          type: string
          nullable: true
        signature:
          type: string
        auditProofHash:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, completed, failed, rejected]
        error:
          type: string
          nullable: true
        createdAt:
          type: string

    # --- AI ---
    SemanticSearchResult:
      type: object
      properties:
        documentId:
          type: string
        title:
          type: string
        chunkContent:
          type: string
        similarity:
          type: number

    AssistantResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SemanticSearchResult"

    # --- Erasure ---
    ErasureAttestation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
        actorId:
          type: string
        actorType:
          type: string
          enum: [human, agent, system]
        reason:
          type: string
        preStateHash:
          type: string
        postStateHash:
          type: string
        stateChanged:
          type: boolean
        yjsSizeBefore:
          type: integer
        yjsSizeAfter:
          type: integer
        createdAt:
          type: string

    ErasureRequestBody:
      type: object
      required: [documentId, reason]
      properties:
        documentId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 1
          maxLength: 500

    RetentionPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        documentType:
          type: string
        maxAgeDays:
          type: integer
        autoPurge:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string

    CreatePolicyBody:
      type: object
      required: [name, maxAgeDays]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        documentType:
          type: string
          default: "*"
        maxAgeDays:
          type: integer
          minimum: 1
        autoPurge:
          type: boolean
          default: false

    RetentionScanResult:
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/RetentionPolicy"
        matchedDocuments:
          type: array
          items:
            type: object
            properties:
              documentId:
                type: string
              title:
                type: string
              documentType:
                type: string
              updatedAt:
                type: string
              ageDays:
                type: number

    # --- Admin ---
    PurgeReceipt:
      type: object
      properties:
        userId:
          type: string
        action:
          type: string
          enum: [delete, transfer]
        transferTo:
          type: string
        deletedAt:
          type: string
          format: date-time
        deleted:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [document, grant]
              id:
                type: string
        transferred:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [document, grant]
              id:
                type: string

    # --- Metrics ---
    MetricsSummary:
      type: object
      description: Full operational and health summary from observability module

    HealthIndicators:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        indicators:
          type: object

    AuditMetrics:
      type: object
      properties:
        totalEntries:
          type: integer
        documentsTracked:
          type: integer
        lastEntryAt:
          type: string
          format: date-time
          nullable: true

security:
  - BearerAuth: []

paths:
  # ===== Documents =====

  /api/documents:
    get:
      tags: [Documents]
      summary: List documents
      description: List documents, optionally filtered by folder. Results filtered by user permissions.
      parameters:
        - name: folderId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
    post:
      tags: [Documents]
      summary: Create a document
      description: Create a new document. Optionally use a template via query param.
      parameters:
        - name: templateId
          in: query
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Document"
                  - type: object
                    properties:
                      templateContent:
                        type: object
                        nullable: true
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/search:
    get:
      tags: [Documents]
      summary: Full-text search documents
      description: Search documents by text query. Results filtered by user permissions.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 200
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    rank:
                      type: number
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Get a document
      description: Retrieve a single document by ID. Requires read permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Documents]
      summary: Update document title
      description: Update the title of a document. Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
    delete:
      tags: [Documents]
      summary: Delete a document
      description: Delete a document, its cache entries, and permission grants. Requires delete permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deletion receipt
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedAt:
                    type: string
                    format: date-time
                  documentId:
                    type: string
                  scope:
                    type: string
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/move:
    put:
      tags: [Documents]
      summary: Move document to a folder
      description: Move a document into a folder (or to root with null). Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveDocumentBody"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/export:
    post:
      tags: [Documents]
      summary: Export document as HTML or text
      description: Client-side export. Requires read permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format, content]
              properties:
                format:
                  type: string
                  enum: [html, text]
                content:
                  type: string
                  description: HTML content to export
      responses:
        "200":
          description: Exported file (text/html or text/plain)
          content:
            text/html:
              schema:
                type: string
            text/plain:
              schema:
                type: string
        "400":
          description: Invalid format or missing content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/import:
    post:
      tags: [Documents]
      summary: Import HTML into a document
      description: Import HTML content into an existing document. Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [html]
              properties:
                html:
                  type: string
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  html:
                    type: string
                  documentId:
                    type: string
        "400":
          description: Missing HTML content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/convert-export:
    post:
      tags: [Documents]
      summary: Export document via Collabora (docx/odt/pdf)
      description: Server-side conversion via Collabora. Requires read permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format, content]
              properties:
                format:
                  type: string
                  enum: [docx, odt, pdf]
                content:
                  type: string
                  description: HTML content to convert
                requestedBy:
                  type: string
      responses:
        "200":
          description: Converted file binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            X-Export-Stale:
              schema:
                type: string
            X-Export-At:
              schema:
                type: string
        "400":
          description: Invalid format or missing content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Collabora conversion service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/convert-import:
    post:
      tags: [Documents]
      summary: Import document via Collabora (docx/odt/pdf)
      description: Upload a file for server-side conversion to document content. Requires write permission. Max 50 MB.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Filename
          in: header
          schema:
            type: string
            default: upload.docx
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  documentId:
                    type: string
                  snapshot:
                    type: object
        "400":
          description: Unsupported format or empty body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Collabora conversion service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Versions =====

  /api/documents/{id}/versions:
    get:
      tags: [Versions]
      summary: List versions
      description: List all versions for a document. Requires read permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Version"
    post:
      tags: [Versions]
      summary: Create a named version
      description: Snapshot the current document state as a named version. Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionBody"
      responses:
        "201":
          description: Created version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/versions/{versionId}:
    get:
      tags: [Versions]
      summary: Get a specific version
      description: Retrieve a single version by ID. Requires read permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Version object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Versions]
      summary: Delete a version
      description: Remove a version record. Requires delete permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/documents/{id}/versions/{versionId}/restore:
    post:
      tags: [Versions]
      summary: Restore a version
      description: Restore a document to a previous version's state. Disconnects active WebSocket sessions. Requires write permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  restoredVersion:
                    type: integer
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===== Folders =====

  /api/folders:
    get:
      tags: [Folders]
      summary: List folders
