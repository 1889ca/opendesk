  # ===== Federation =====

  /api/federation/peers:
    get:
      tags: [Federation]
      summary: List federation peers
      description: List all registered federation peers.
      responses:
        "200":
          description: Array of peers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FederationPeer"
    post:
      tags: [Federation]
      summary: Register a federation peer
      description: Register a new peer instance for cross-sovereign federation. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPeerBody"
      responses:
        "201":
          description: Registered peer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederationPeer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/federation/peers/{id}:
    patch:
      tags: [Federation]
      summary: Update peer status
      description: Update a peer's status (active, suspended, revoked). Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, suspended, revoked]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Peer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/federation/send:
    post:
      tags: [Federation]
      summary: Send a document to a peer
      description: Initiate a signed document transfer to a federated peer. Admin only, requires manage permission on the document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDocumentBody"
      responses:
        "200":
          description: Transfer record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferRecord"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/federation/receive:
    post:
      tags: [Federation]
      summary: Receive an inbound transfer
      description: Endpoint called by federated peers to deliver a signed document bundle. Authenticates via peer signature verification (no user auth).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferBundle"
      responses:
        "200":
          description: Transfer record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferRecord"
        "400":
          description: Invalid transfer bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Missing signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Unknown peer or invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/federation/transfers:
    get:
      tags: [Federation]
      summary: List transfer history
      description: List federation transfer history, optionally filtered by peer.
      parameters:
        - name: peerId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Array of transfer records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferRecord"

  # ===== AI =====

  /api/ai/search:
    get:
      tags: [AI]
      summary: Semantic search
      description: Search documents using semantic similarity via local embeddings. Results filtered by user permissions.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 500
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Semantic search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SemanticSearchResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/ai/ask:
    post:
      tags: [AI]
      summary: RAG document assistant
      description: Ask a question and get an AI-generated answer with source citations from your documents. Uses local Ollama models.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  minLength: 2
                  maxLength: 1000
      responses:
        "200":
          description: Assistant response with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/ai/embed:
    post:
      tags: [AI]
      summary: Trigger document embedding
      description: Generate or regenerate vector embeddings for a document. Requires write permission on the document.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentId]
              properties:
                documentId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Embedding result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  documentId:
                    type: string
                  chunks:
                    type: integer
                    description: Number of chunks embedded
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ai/health:
    get:
      tags: [AI]
      summary: Check Ollama connectivity
      description: Check if the local Ollama AI backend is reachable.
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ollama:
                    type: string
                    enum: [ok, unavailable]

  # ===== Erasure =====

  /api/erasure/erase:
    post:
      tags: [Erasure]
      summary: Erase document CRDT history
      description: Verifiably erase a document's CRDT history, producing a cryptographic attestation. Requires manage permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErasureRequestBody"
      responses:
        "201":
          description: Erasure attestation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErasureAttestation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/erasure/attestations/{documentId}:
    get:
      tags: [Erasure]
      summary: Get erasure attestations
      description: Retrieve all erasure attestations for a document. Requires manage permission.
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of attestations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErasureAttestation"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/erasure/policies:
    get:
      tags: [Erasure]
      summary: List retention policies
      description: List all retention policies. Admin only.
      responses:
        "200":
          description: Array of retention policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetentionPolicy"
    post:
      tags: [Erasure]
      summary: Create a retention policy
      description: Create a new data retention policy. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /api/erasure/policies/{id}:
    delete:
      tags: [Erasure]
      summary: Delete a retention policy
      description: Remove a retention policy. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/erasure/scan:
    get:
      tags: [Erasure]
      summary: Scan for documents matching retention policies
      description: Dry-run scan showing which documents match active retention policies. Admin only.
      responses:
        "200":
          description: Array of scan results per policy
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetentionScanResult"

  /api/erasure/execute:
    post:
      tags: [Erasure]
      summary: Execute retention auto-purge
      description: Execute all active auto-purge retention policies, erasing matched documents. Admin only.
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  executed:
                    type: integer
                  attestations:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErasureAttestation"

  # ===== Admin =====

  /api/admin/users/{id}/data:
    delete:
      tags: [Admin]
      summary: Purge user data (GDPR)
      description: Delete or transfer all data owned by a user. Users can only purge their own data.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
            enum: [delete, transfer]
            default: delete
        - name: transferTo
          in: query
          schema:
            type: string
          description: Required when action is "transfer"
      responses:
        "200":
          description: Purge receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurgeReceipt"
        "400":
          description: Invalid action or missing transferTo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Can only purge your own data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/metrics:
    get:
      tags: [Admin]
      summary: Get full metrics summary
      description: Full operational and health summary from the observability module.
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSummary"

  /api/admin/metrics/health:
    get:
      tags: [Admin]
      summary: Get health indicators
      description: Health indicators from the observability module.
      responses:
        "200":
          description: Health indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthIndicators"

  /api/admin/metrics/audit:
    get:
      tags: [Admin]
      summary: Get audit chain health
      description: Summary of audit log chain health (entry count, documents tracked, last entry time).
      responses:
        "200":
          description: Audit metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditMetrics"
