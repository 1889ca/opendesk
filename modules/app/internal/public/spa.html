<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="theme.css">
  <script>
    // Apply stored theme immediately to prevent flash of wrong theme
    (function() {
      var stored = localStorage.getItem('opendesk-theme');
      var theme = stored === 'dark' ? 'dark'
        : stored === 'light' ? 'light'
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="toolbar.css">
  <link rel="stylesheet" href="doc-list.css">
  <link rel="stylesheet" href="templates.css">

  <link rel="stylesheet" href="editor-content.css">
  <link rel="stylesheet" href="tables.css">
  <link rel="stylesheet" href="search-panel.css">
  <link rel="stylesheet" href="comments.css">
  <link rel="stylesheet" href="suggestions.css">
  <link rel="stylesheet" href="a11y.css">
  <link rel="stylesheet" href="toc.css">
  <link rel="stylesheet" href="status-bar.css">
  <link rel="stylesheet" href="versions.css">
  <link rel="stylesheet" href="mentions.css">
  <link rel="stylesheet" href="drag-handle.css">
  <link rel="stylesheet" href="mobile.css">
  <link rel="stylesheet" href="code-block.css">
  <link rel="stylesheet" href="emoji.css">
  <link rel="stylesheet" href="print.css">

</head>

</body>
</html>
