<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="logo">OpenDesk</h1>
      <span class="doc-label">Document:</span>
      <span id="doc-name" class="doc-name">loading...</span>
    </div>
    <div class="toolbar-right">
      <span id="status" class="status disconnected">Connecting...</span>
      <span class="users-label">Editors:</span>
      <span id="users" class="users">-</span>
    </div>
  </header>
  <main class="editor-wrapper">
    <div id="editor"></div>
  </main>
  <script src="editor.bundle.js?v=3"></script>
</body>
</html>
