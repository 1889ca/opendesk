<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="doc-list.bundle.css">
  <script src="theme-init.js"></script>
</head>
<body class="has-ws-sidebar">
  <div id="workspace-sidebar"></div>
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="logo">
        <svg class="logo-mark" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <rect x="2" y="3" width="16" height="20" rx="2.5" fill="var(--accent)" opacity="0.9"/>
          <path d="M14 3 L18 7 L18 23" fill="var(--accent-hover, var(--accent))" opacity="0.7"/>
          <line x1="5" y1="10" x2="13" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="14" x2="13" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="18" x2="10" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="16" y="16" width="10" height="8" rx="1.5" fill="var(--accent)" opacity="0.85"/>
          <line x1="18" y1="20" x2="24" y2="20" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
          <line x1="18" y1="22.5" x2="22" y2="22.5" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
        </svg>
        OpenDesk
      </h1>
    </div>
    <div class="toolbar-right">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
      <a href="/entities.html" class="btn btn-secondary">Entity Directory</a>
      <a href="/kb.html" class="btn btn-secondary">Knowledge Base</a>
      <div class="new-doc-group">
        <button id="new-doc-btn" class="btn btn-primary" data-type="text">New Document</button>
        <button id="new-sheet-btn" class="btn btn-secondary" data-type="spreadsheet">New Spreadsheet</button>
        <button id="new-slides-btn" class="btn btn-secondary" data-type="presentation">New Presentation</button>
      </div>
    </div>
  </header>
  <main class="doc-list-wrapper">
    <div id="doc-list" class="doc-list">
      <div class="doc-list-loading">Loading documents...</div>
    </div>
  </main>

  <script type="module" src="doc-list.bundle.js"></script>
</body>
</html>
