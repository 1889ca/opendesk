<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="doc-list.bundle.css">
  <script src="theme-init.js"></script>
</head>
<body class="has-ws-sidebar">
  <div id="workspace-sidebar"></div>
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="logo" aria-label="OpenDesk">
        <svg class="logo-mark" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <rect x="2" y="3" width="16" height="20" rx="2.5" fill="var(--accent)" opacity="0.9"/>
          <path d="M14 3 L18 7 L18 23" fill="var(--accent-hover, var(--accent))" opacity="0.7"/>
          <line x1="5" y1="10" x2="13" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="14" x2="13" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="18" x2="10" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="16" y="16" width="10" height="8" rx="1.5" fill="var(--accent)" opacity="0.85"/>
          <line x1="18" y1="20" x2="24" y2="20" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
          <line x1="18" y1="22.5" x2="22" y2="22.5" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
        </svg>
        OpenDesk
      </h1>
    </div>
    <div class="toolbar-right">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
      <div class="create-dropdown">
        <button id="create-btn" class="btn btn-primary create-dropdown-toggle">
          <span aria-hidden="true">+</span> New
        </button>
        <div class="create-dropdown-menu" id="create-menu" hidden>
          <button class="create-dropdown-item" id="new-doc-btn" data-type="text">
            <span class="create-item-icon create-item-icon--doc"></span>
            <span class="create-item-info">
              <span class="create-item-label">Document</span>
              <span class="create-item-desc">Write and collaborate</span>
            </span>
          </button>
          <button class="create-dropdown-item" id="new-sheet-btn" data-type="spreadsheet">
            <span class="create-item-icon create-item-icon--sheet"></span>
            <span class="create-item-info">
              <span class="create-item-label">Spreadsheet</span>
              <span class="create-item-desc">Organize data</span>
            </span>
          </button>
          <button class="create-dropdown-item" id="new-slides-btn" data-type="presentation">
            <span class="create-item-icon create-item-icon--slides"></span>
            <span class="create-item-info">
              <span class="create-item-label">Presentation</span>
              <span class="create-item-desc">Present ideas</span>
            </span>
          </button>
          <div class="create-dropdown-sep"></div>
          <button class="create-dropdown-item" id="new-folder-btn">
            <span class="create-item-icon create-item-icon--folder"></span>
            <span class="create-item-info">
              <span class="create-item-label">Folder</span>
              <span class="create-item-desc">Organize files</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </header>
  <main class="doc-list-wrapper">
    <div id="doc-list" class="doc-list">
      <div class="doc-list-loading">Loading documents...</div>
    </div>
  </main>

  <script type="module" src="doc-list.bundle.js"></script>
</body>
</html>
