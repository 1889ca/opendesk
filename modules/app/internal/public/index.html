<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="logo">OpenDesk</h1>
    </div>
    <div class="toolbar-right">
      <button id="new-doc-btn" class="btn btn-primary">New Document</button>
    </div>
  </header>
  <main class="doc-list-wrapper">
    <div id="doc-list" class="doc-list">
      <div class="doc-list-loading">Loading documents...</div>
    </div>
  </main>

  <script type="module" src="doc-list.bundle.js"></script>
</body>
</html>
