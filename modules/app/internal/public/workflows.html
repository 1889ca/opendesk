<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk - Workflow Editor</title>
  <link rel="stylesheet" href="workflows.bundle.css">
  <script>
    (function() {
      var stored = localStorage.getItem('opendesk-theme');
      var theme = stored === 'dark' ? 'dark'
        : stored === 'light' ? 'light'
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="workflow-root"></div>
  <script type="module" src="workflows.bundle.js"></script>
</body>
</html>
