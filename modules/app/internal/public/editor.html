<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk</title>
  <link rel="stylesheet" href="editor.bundle.css">
  <link rel="stylesheet" href="entity-mentions.css">
  <link rel="stylesheet" href="slash-commands.css">
  <script src="theme-init.js"></script>
</head>
<body>
  <div class="editor-top-chrome">
  <header class="toolbar" id="app-toolbar">
    <!-- Shared chrome (logo, title, status, users) injected by mountAppToolbar() in editor.ts -->
    <div class="toolbar-actions-slot">
      <!-- File operations -->
      <button id="import-file" class="btn btn-ghost btn-sm" title="Import .docx, .odt, or .pdf">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 1v9M4.5 6.5L8 10l3.5-3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Import
      </button>
      <div class="export-dropdown">
        <button class="btn btn-ghost btn-sm export-dropdown-toggle" aria-haspopup="true" aria-expanded="false" title="Export document">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 11V2M4.5 7.5L8 4l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Export &#9660;
        </button>
        <div class="export-dropdown-menu" hidden>
          <button id="export-html" class="export-dropdown-item" title="Export as HTML">HTML</button>
          <button id="export-text" class="export-dropdown-item" title="Export as plain text">Text</button>
          <button id="export-docx" class="export-dropdown-item" title="Export as Word document">DOCX</button>
          <button id="export-odt" class="export-dropdown-item" title="Export as OpenDocument">ODT</button>
        </div>
      </div>
      <span class="toolbar-separator"></span>
      <!-- Layout / page options dropdown -->
      <div class="layout-dropdown">
        <button class="btn btn-ghost btn-sm layout-dropdown-toggle" aria-haspopup="true" aria-expanded="false" title="Layout and page options">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1.5" y="2" width="13" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><line x1="1.5" y1="6" x2="14.5" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="1.5" y1="10" x2="14.5" y2="10" stroke="currentColor" stroke-width="1.3"/></svg>
          Layout &#9660;
        </button>
        <div class="layout-dropdown-menu" hidden>
          <button id="page-setup-btn" class="layout-dropdown-item" title="Page setup (paper size, orientation)">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="3" y="1" width="10" height="14" rx="1" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="5" x2="10.5" y2="5" stroke="currentColor" stroke-width="1.2"/><line x1="5.5" y1="7.5" x2="10.5" y2="7.5" stroke="currentColor" stroke-width="1.2"/><line x1="5.5" y1="10" x2="8.5" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
            Page Setup
          </button>
          <button id="ruler-toggle" class="layout-dropdown-item" title="Show or hide the document ruler" aria-pressed="true">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="1" y="5" width="14" height="6" rx="1" stroke="currentColor" stroke-width="1.3"/><line x1="4" y1="8" x2="4" y2="11" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="8" x2="7" y2="10" stroke="currentColor" stroke-width="1.1"/><line x1="10" y1="8" x2="10" y2="11" stroke="currentColor" stroke-width="1.2"/><line x1="13" y1="8" x2="13" y2="10" stroke="currentColor" stroke-width="1.1"/></svg>
            <span id="ruler-toggle-label">Hide Ruler</span>
          </button>
          <div class="layout-dropdown-divider"></div>
          <button id="insert-page-number" class="layout-dropdown-item" title="Insert page number into footer">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><text x="8" y="11" text-anchor="middle" font-size="8" font-weight="600" fill="currentColor" font-family="inherit">#</text></svg>
            Insert Page #
          </button>
        </div>
      </div>
      <span class="toolbar-separator"></span>
      <!-- Zoom control -->
      <div class="zoom-control" id="zoom-control">
        <button class="btn btn-ghost btn-sm zoom-btn" id="zoom-out" title="Zoom out (−)">−</button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button class="btn btn-ghost btn-sm zoom-btn" id="zoom-in" title="Zoom in (+)">+</button>
      </div>
      <span class="toolbar-separator"></span>
      <!-- Share — primary CTA -->
      <button id="share-btn" class="btn btn-primary btn-sm share-btn" title="Share this document">Share</button>
    </div>
  </header>
  <div id="formatting-toolbar" class="formatting-toolbar"></div>
  <div id="ruler-h" class="ruler-h" aria-hidden="true"></div>
  </div><!-- /.editor-top-chrome -->
  <main class="editor-wrapper" role="main" aria-label="Document editor">
    <div id="editor"></div>
  </main>

  <div id="share-dialog" class="share-overlay" hidden>
    <div class="share-dialog">
      <div class="share-header">
        <h3>Share document</h3>
        <button id="share-close" class="share-close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="share-body">
        <span class="share-role-label" id="share-role-label">Permission level</span>
        <div
          class="share-role-dropdown"
          id="share-role-dropdown"
          role="listbox"
          aria-labelledby="share-role-label"
          aria-expanded="false"
          tabindex="0"
        >
          <div class="share-role-trigger" id="share-role-trigger" aria-hidden="true">
            <span class="share-role-trigger-text">Viewer</span>
            <span class="share-role-arrow" aria-hidden="true">&#9660;</span>
          </div>
          <ul class="share-role-menu" role="presentation">
            <li class="share-role-option share-role-option--selected" role="option" data-value="viewer" aria-selected="true" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Viewer</span>
              <span class="share-role-option-desc">Can read the document</span>
            </li>
            <li class="share-role-option" role="option" data-value="commenter" aria-selected="false" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Commenter</span>
              <span class="share-role-option-desc">Can read and comment</span>
            </li>
            <li class="share-role-option" role="option" data-value="editor" aria-selected="false" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Editor</span>
              <span class="share-role-option-desc">Can read, comment, and edit</span>
            </li>
          </ul>
        </div>
        <input type="hidden" id="share-role" value="viewer">
        <button id="share-create" class="share-create-btn">Create link</button>
        <div id="share-result" class="share-result" hidden>
          <input id="share-url" class="share-url" readonly>
          <button id="share-copy" class="share-copy-btn">Copy link</button>
        </div>
      </div>
    </div>
  </div>
  <script src="editor.bundle.js?v=8"></script>
</body>
</html>
