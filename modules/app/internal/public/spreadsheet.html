<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk Spreadsheet</title>
  <link rel="stylesheet" href="spreadsheet.bundle.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <a href="/" class="back-link">Back to documents</a>
      <span class="toolbar-separator"></span>
      <input
        id="doc-title"
        class="doc-title-input"
        type="text"
        value="Loading..."
        spellcheck="false"
      />
    </div>
    <div class="toolbar-center" id="chart-toolbar-mount"></div>
    <div class="toolbar-right">
      <span id="status" class="status disconnected">Connecting...</span>
      <span class="users-label">Editors:</span>
      <span id="users" class="users">-</span>
    </div>
  </header>
  <div id="format-bar-container"></div>
  <div id="formula-bar" class="formula-bar">
    <label class="formula-bar-cell" id="cell-ref">A1</label>
    <input id="formula-input" class="formula-bar-input" type="text" placeholder="Enter value or formula" />
  </div>
  <main class="spreadsheet-wrapper">
    <div class="spreadsheet-viewport">
      <div id="spreadsheet" class="spreadsheet-grid"></div>
      <div id="chart-container" class="chart-container"></div>
    </div>
  </main>
  <div id="sheet-tab-container"></div>

  <script src="spreadsheet.bundle.js?v=2"></script>
</body>
</html>
