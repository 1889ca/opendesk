<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk Spreadsheet</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="spreadsheet.bundle.css">
</head>
<body>
  <header class="toolbar" id="app-toolbar">
    <!-- Shared chrome (logo, title, status, users) injected by mountAppToolbar() in spreadsheet-editor.ts -->
    <div class="toolbar-actions-slot">
      <div class="export-group">
        <button id="sheet-import" class="btn btn-ghost btn-sm" title="Import .xlsx, .ods, or .csv">Import</button>
        <span class="toolbar-separator"></span>
        <button id="sheet-export-csv" class="btn btn-ghost btn-sm" title="Export as CSV">CSV</button>
        <button id="sheet-export-xlsx" class="btn btn-ghost btn-sm" title="Export as Excel">XLSX</button>
        <button id="sheet-export-ods" class="btn btn-ghost btn-sm" title="Export as OpenDocument">ODS</button>
      </div>
      <span class="toolbar-separator"></span>
      <div class="dataset-group">
        <button id="dataset-link-btn" class="btn btn-ghost btn-sm" title="Link KB Dataset">Dataset</button>
        <span id="dataset-indicator" class="dataset-indicator" hidden></span>
      </div>
    </div>
    <div class="toolbar-center" id="chart-toolbar-mount"></div>
  </header>
  <div id="format-bar-container"></div>
  <div id="formula-bar" class="formula-bar">
    <label class="formula-bar-cell" id="cell-ref">A1</label>
    <input id="formula-input" class="formula-bar-input" type="text" placeholder="Enter value or formula" />
  </div>
  <main class="spreadsheet-wrapper">
    <div class="spreadsheet-viewport">
      <div id="spreadsheet" class="spreadsheet-grid"></div>
      <div id="chart-container" class="chart-container"></div>
    </div>
  </main>
  <div id="sheet-tab-container"></div>

  <script src="spreadsheet.bundle.js?v=2"></script>
</body>
</html>
