<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk Spreadsheet</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="spreadsheet.bundle.css">
</head>
<body>
  <header class="toolbar" id="app-toolbar">
    <!-- Shared chrome (logo, title, status, users) injected by mountAppToolbar() in spreadsheet-editor.ts -->
    <div class="toolbar-actions-slot">
      <div class="export-group">
        <button id="sheet-import" class="btn btn-ghost btn-sm" title="Import .xlsx, .ods, or .csv">Import</button>
        <span class="toolbar-separator"></span>
        <button id="sheet-export-csv" class="btn btn-ghost btn-sm" title="Export as CSV">CSV</button>
        <button id="sheet-export-xlsx" class="btn btn-ghost btn-sm" title="Export as Excel">XLSX</button>
        <button id="sheet-export-ods" class="btn btn-ghost btn-sm" title="Export as OpenDocument">ODS</button>
      </div>
      <span class="toolbar-separator"></span>
      <div class="dataset-group">
        <button id="dataset-link-btn" class="btn btn-ghost btn-sm" title="Link KB Dataset">Dataset</button>
        <span id="dataset-indicator" class="dataset-indicator" hidden></span>
      </div>
      <span class="toolbar-separator"></span>
      <button id="share-btn" class="btn btn-ghost btn-sm share-btn" title="Share this spreadsheet">Share</button>
    </div>
    <div class="toolbar-center" id="chart-toolbar-mount"></div>
  </header>
  <div id="format-bar-container"></div>
  <div id="formula-bar" class="formula-bar">
    <label class="formula-bar-cell" id="cell-ref">A1</label>
    <input id="formula-input" class="formula-bar-input" type="text" placeholder="Enter value or formula" />
  </div>
  <main class="spreadsheet-wrapper">
    <div class="spreadsheet-viewport">
      <div id="spreadsheet" class="spreadsheet-grid"></div>
      <div id="chart-container" class="chart-container"></div>
    </div>
  </main>
  <div id="sheet-tab-container"></div>

  <div id="share-dialog" class="share-overlay" hidden>
    <div class="share-dialog">
      <div class="share-header">
        <h3>Share spreadsheet</h3>
        <button id="share-close" class="share-close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="share-body">
        <span class="share-role-label" id="share-role-label">Permission level</span>
        <div
          class="share-role-dropdown"
          id="share-role-dropdown"
          role="listbox"
          aria-labelledby="share-role-label"
          aria-expanded="false"
          tabindex="0"
        >
          <div class="share-role-trigger" id="share-role-trigger" aria-hidden="true">
            <span class="share-role-trigger-text">Viewer</span>
            <span class="share-role-arrow" aria-hidden="true">&#9660;</span>
          </div>
          <ul class="share-role-menu" role="presentation">
            <li class="share-role-option share-role-option--selected" role="option" data-value="viewer" aria-selected="true" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Viewer</span>
              <span class="share-role-option-desc">Can read the spreadsheet</span>
            </li>
            <li class="share-role-option" role="option" data-value="commenter" aria-selected="false" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Commenter</span>
              <span class="share-role-option-desc">Can read and comment</span>
            </li>
            <li class="share-role-option" role="option" data-value="editor" aria-selected="false" tabindex="-1">
              <span class="share-role-check" aria-hidden="true">&#10003;</span>
              <span class="share-role-option-label">Editor</span>
              <span class="share-role-option-desc">Can read, comment, and edit</span>
            </li>
          </ul>
        </div>
        <input type="hidden" id="share-role" value="viewer">
        <button id="share-create" class="share-create-btn">Create link</button>
        <div id="share-result" class="share-result" hidden>
          <input id="share-url" class="share-url" readonly>
          <button id="share-copy" class="share-copy-btn">Copy link</button>
        </div>
      </div>
    </div>
  </div>

  <script src="spreadsheet.bundle.js?v=2"></script>
</body>
</html>
