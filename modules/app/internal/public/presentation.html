<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk Presentation</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="presentation.bundle.css">
</head>
<body>
  <header class="toolbar" id="app-toolbar">
    <!-- Shared chrome (logo, title, status, users) injected by mountAppToolbar() in presentation-editor.ts -->
    <!-- Remaining buttons (import/export, layout, theme, present) injected by presentation-editor.ts -->
    <div class="toolbar-actions-slot">
      <button id="add-slide-btn" class="btn btn-ghost btn-sm">Add Slide</button>
    </div>
  </header>
  <main class="presentation-wrapper">
    <aside id="slide-panel" class="slide-panel">
      <div class="slide-panel-list" id="slide-list"></div>
    </aside>
    <section id="slide-canvas" class="slide-canvas">
      <div class="slide-viewport" id="slide-viewport"></div>
    </section>
  </main>

  <script src="presentation.bundle.js?v=2"></script>
</body>
</html>
