<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDesk — Opening shared document...</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .share-resolve {
      max-width: 28rem;
      margin: 4rem auto;
      text-align: center;
      padding: 2rem;
    }
    .share-resolve h2 { margin-bottom: 0.5rem; }
    .share-resolve p { color: var(--text-secondary); }
    .share-error { color: var(--error, #c00); }
    .share-password { margin-top: 1rem; }
    .share-password input {
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      width: 100%;
      max-width: 16rem;
      margin-bottom: 0.5rem;
    }
    .share-password button {
      padding: 0.5rem 1rem;
      background: var(--accent);
      color: var(--accent-text, #fff);
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="share-resolve">
    <h2 id="heading">Opening shared document...</h2>
    <p id="message">Resolving your share link.</p>
    <div id="password-form" class="share-password" hidden>
      <input id="password-input" type="password" placeholder="Enter password">
      <br>
      <button id="password-submit">Submit</button>
    </div>
  </div>

  <script type="module" src="share-resolve.bundle.js"></script>
</body>
</html>
