# Contract: contracts/config/rules.md
# Production overlay for OpenDesk
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires: .env file with all variables defined (see .env.example)

services:
  postgres:
    environment:
      POSTGRES_DB: ${PG_DATABASE}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports: !override []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports: !override []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports: !override []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  convert:
    environment:
      - extra_params=--o:ssl.enable=true --o:ssl.termination=true
    ports: !override []
    restart: unless-stopped
    networks:
      - default
      - collabora-internal
    deploy:
      resources:
        limits:
          memory: 2g

  opendesk:
    environment:
      PORT: "3000"
      AUTH_MODE: ${AUTH_MODE}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: ${PG_DATABASE}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      COLLABORA_URL: http://convert:9980
      SESSION_SECRET: ${SESSION_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
    ports: !override []
    restart: unless-stopped
    networks:
      - default
      - collabora-internal
    deploy:
      resources:
        limits:
          memory: 1g

  nginx:
    ports: !override
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  collabora-internal:
    internal: true
