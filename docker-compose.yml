services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: opendesk
      POSTGRES_USER: opendesk
      POSTGRES_PASSWORD: opendesk_dev
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendesk"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass opendesk_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opendesk
      MINIO_ROOT_PASSWORD: opendesk_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  convert:
    image: collabora/code:latest
    environment:
      - extra_params=--o:ssl.enable=false
    ports:
      - "9980:9980"
    mem_limit: 2g
    memswap_limit: 2g
    oom_score_adj: 500

  opendesk:
    build: .
    environment:
      PORT: "3000"
      AUTH_MODE: dev
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: opendesk
      PG_USER: opendesk
      PG_PASSWORD: opendesk_dev
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: opendesk
      S3_SECRET_KEY: opendesk_dev
      S3_BUCKET: opendesk
      REDIS_URL: redis://:opendesk_dev@redis:6379
      COLLABORA_URL: http://convert:9980
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      convert:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - opendesk

volumes:
  pg_data:
  redis_data:
  minio_data:
