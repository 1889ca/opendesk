services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opendesk
      POSTGRES_USER: opendesk
      POSTGRES_PASSWORD: opendesk_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opendesk
      MINIO_ROOT_PASSWORD: opendesk_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  convert:
    image: collabora/code:latest
    environment:
      - extra_params=--o:ssl.enable=false
    ports:
      - "9980:9980"
    mem_limit: 2g
    memswap_limit: 2g
    oom_score_adj: 500

volumes:
  pg_data:
  redis_data:
  minio_data:
